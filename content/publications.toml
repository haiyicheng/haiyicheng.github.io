description = "I was trained as a demographer. My recent publication in Social Science & Medicine examines the relationship between financial assets and cardiometabolic risk in early adulthood. My other ongoing projects explore how educational trajectories shape the link between sleep patterns and mental health among Chinese adolescents, and how intergenerational income transmission varies across cohorts. These projects share a common thread: how institutional pathways translate social position into concrete differences in health, mobility, and life chances.\n\nAlongside this, I have developed a growing interest in a prior question: how do the categories we use to study inequality come to exist in the first place? How does the state acquire the capacity to sort people into classifications that then organize their life chances? I am particularly drawn to mobile populations as a site for studying the production of state knowledge, because migrants are the cases where the mechanisms and limits of classification are most exposed."
source = "publications.bib"
